<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Engineering Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
  if (window === window.top) {
    window.location.href = "dashboard.html";
  }
  </script>
  
  <link rel="stylesheet" href="./style.css" />
  
  <!-- Azure Maps CSS -->
  <link rel="stylesheet" href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/2/atlas.min.css" />
  
  <!-- Azure Maps Drawing Tools CSS -->
  <link rel="stylesheet" href="https://atlas.microsoft.com/sdk/javascript/drawing/0/atlas-drawing.min.css" />
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <h2>Tools</h2>
  <ul>
    <li><a href="#" data-panel="slopePanel">Slope Calculator</a></li>
    <li><a href="#" data-panel="mapPanel">Maps Tool</a></li>
  </ul>
</div>

<!-- Small toggle button -->
<button class="sidebar-toggle" id="sidebarToggle">☰</button>

<!-- ================= SLOPE PANEL ================= -->
<div class="panel active" id="slopePanel">
  <div class="grid">

    <!-- Column 1 -->
    <div class="card">
      <h2>Slope Calculator</h2>

      <label>Higher Elevation (HE)</label>
      <input type="number" id="he">

      <label>Lower Elevation (LE)</label>
      <input type="number" id="le">

      <label>Horizontal Distance</label>
      <input type="number" id="distance">

      <label>Slope (%)</label>
      <input type="number" id="slope">

      <button id="calculateBtn">Calculate</button>
      <button id="resetBtn" class="secondary">Reset</button>

      <div id="result" class="result"></div>
    </div>

    <!-- Column 2 -->
    <div class="card">
      <h2>Slope Conversion</h2>

      <label>Percent (%)</label>
      <input type="number" id="convPercent">

      <label>Ratio (rise : run)</label>
      <div class="ratio">
        <input type="number" id="ratioRise">
        <span>:</span>
        <input type="number" id="ratioRun">
      </div>

      <label>Angle (degrees)</label>
      <input type="number" id="convAngle">

      <button id="convertBtn">Convert</button>

      <div id="convResult" class="result"></div>
    </div>

    <!-- Column 3 -->
    <div class="card placeholder">
      <h2>Future Tool</h2>
      <p>Reserved for upcoming features.</p>
    </div>

    <!-- Column 4 -->
    <div class="card placeholder">
      <h2>Graphing Calculator</h2>
      <script src="/api/desmos"></script>
      <div id="calculator" style="width: 450px; height: 400px;"></div>
      <script>
      window.addEventListener("load", function () {
        var check = setInterval(function () {
          if (window.Desmos) {
             clearInterval(check);
             var elt = document.getElementById('calculator');
             var calculator = Desmos.ScientificCalculator(elt);
          }
        }, 50);
      });
      </script>
    </div>
  </div>
</div>

<!-- ================= MAP PANEL ================= -->
<div class="panel" id="mapPanel">
  <div id="map"></div>

  <!-- Search bar -->
  <div class="map-search">
    <input type="text" id="mapSearchInput" placeholder="🔍 Search location..." />
    <div id="searchResults" class="search-results"></div>
  </div>

  <!-- Map toolbar -->
  <div class="map-toolbar">
    <button id="toggleStyle">🛰️ Satellite</button>
    <button id="toggleLabels">🏷️ Hide Labels</button>
    <button id="clearShape">Clear Shape</button>
  </div>

  <!-- Navigation controls -->
  <div class="nav-controls">
    <button id="lockRotation" title="Unlock Rotation">🔒</button>
    <button id="zoomIn" title="Zoom In">+</button>
    <button id="zoomOut" title="Zoom Out">−</button>
    <button id="rotateLeft" title="Rotate Left">↺</button>
    <button id="rotateRight" title="Rotate Right">↻</button>
    <button id="resetNorth" title="Reset to North">🧭</button>
  </div>
</div>

<!-- Right-click context menu -->
<div id="contextMenu" class="context-menu">
  <div data-action="drawTools">📐 Drawing Tools</div>
  <div data-action="coords">📍 Show Coordinates</div>
  <div data-action="area">📏 Calculate Area</div>
  <div data-action="startDistance">📐 Start Distance Measure</div>
  <div data-action="finishDistance">✓ Finish Distance Measure</div>
  <div data-action="clear">🗑️ Clear All</div>
  <div data-action="export">💾 Export Map</div>
</div>

<!-- Info panel -->
<div id="infoPanel" class="info-panel"></div>

<!-- Main application script (ES6 Module) -->
<script type="module" src="./js/main.js"></script>
</body>
</html>
